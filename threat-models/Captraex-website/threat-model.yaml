  - ID: T_007_BUILD_TIME_ENDPOINT_TAMPER
    title: "Build-Time Endpoint Poisoning via Public Environment Variable Misconfiguration"
    threatType: "Tampering"
    attack: >
      NEXT_PUBLIC_APP_URL and NEXT_PUBLIC_API_BASE are injected at build time.
      If these values are malicious or misconfigured, website sign-in and checkout
      flows route users to attacker-controlled infrastructure while still appearing
      under trusted brand pages.
    impactDesc: >
      High-confidence phishing and payment diversion from legitimate UI. Users are
      redirected to fake app or API endpoints controlled by attacker.
    impactedSecObj:
      - SO-INT
      - SO-BRAND
      - SO-AUTH
    attackers:
      - ATT_INSIDER
      - ATT_SUPPLY_CHAIN
    CVSS:
      vector: "CVSS:3.1/AV:N/AC:H/PR:H/UI:R/S:C/C:H/I:H/A:N"
      score: 7.2
      severity: "High"
    fullyMitigated: true
    alwaysPresent: false

    testPrerequisites:
      - "CI access in non-production environment"
      - "Ability to override NEXT_PUBLIC_APP_URL and NEXT_PUBLIC_API_BASE in test build"

    testSteps:
      - "Build site with NEXT_PUBLIC_APP_URL set to attacker-controlled test domain"
      - "Open built site and click Sign in"
      - "Verify browser navigates to injected domain"
      - "Repeat for NEXT_PUBLIC_API_BASE and checkout call"
      - "Confirm no build-time validation blocks unapproved hostnames"

    testScripts:
      - language: "bash"
        description: "Demonstrate build-time endpoint injection and output artifact impact"
        code: |
          #!/bin/bash
          set -e

          NEXT_PUBLIC_APP_URL="https://evil.example" \
          NEXT_PUBLIC_API_BASE="https://evil.example" \
          npm run build

          echo "[*] Searching output for injected endpoint..."
          grep -R "evil.example" out/ | head -20
        requirements:
          - "npm"
          - "grep"

    testTools:
      - "CI pipeline dry-run"
      - "Static artifact inspection"

    expectedBehavior: >
      Build succeeds and generated artifacts embed attacker-controlled endpoints.

    expectedMitigation: >
      Build fails unless public endpoints match strict production allowlist.
      Runtime guards reject off-domain redirects.

    countermeasures:
      - ID: CM_007_ENV_ALLOWLIST
        title: "Enforce Build-Time Host Allowlist for Public Endpoint Variables"
        description: >
          Add CI assertion that NEXT_PUBLIC_APP_URL and NEXT_PUBLIC_API_BASE must
          match approved captraex domains for production deploys.
        status: in_place

      - ID: CM_007_RUNTIME_HOST_GUARD
        title: "Add Runtime Guard Before External Navigation"
        description: >
          Validate destination host in client navigation code before redirecting.
        status: in_place

      - ID: CM_007_SECRET_GOVERNANCE
        title: "Protect Production Environment Variable Secrets in GitHub"
        description: >
          Restrict who can modify production secrets and require audited approvals
          for secret changes.
        status: in_place

  - ID: T_008_CHECKOUT_API_ABUSE
    title: "Checkout Endpoint Abuse and Conversion Path Degradation"
    threatType: "Denial of Service"
    attack: >
      Public checkout creation endpoint can be targeted with automated high-volume
      POST requests, causing backend strain, third-party billing noise, and failed
      trial conversion attempts for real visitors.
    impactDesc: >
      Availability degradation in key revenue path, increased operational cost,
      reduced conversion rates, and reputation impact during campaigns.
    impactedSecObj:
      - SO-AVAIL
      - SO-BRAND
    attackers:
      - ATT_EXT
    CVSS:
      vector: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H"
      score: 7.5
      severity: "High"
    fullyMitigated: true
    alwaysPresent: true

    testPrerequisites:
      - "Non-production API environment"
      - "Load-testing tool or scripted curl loop"

    testSteps:
      - "Send burst traffic to /api/subscription/checkout with randomized payloads"
      - "Observe API latency and error rates"
      - "Verify per-IP and per-fingerprint throttling responses (HTTP 429)"
      - "Check whether abuse telemetry and alerts fire"
      - "Validate legitimate user checkout requests still succeed under load"

    testScripts:
      - language: "bash"
        description: "Simple burst test for checkout endpoint throttling"
        code: |
          #!/bin/bash
          API_BASE="$1"   # e.g., https://api.captraex.com
          N="${2:-100}"

          for i in $(seq 1 "$N"); do
            curl -s -o /dev/null -w "%{http_code}\n" \
              -X POST "$API_BASE/api/subscription/checkout" \
              -H "Content-Type: application/json" \
              -d '{"target_tier":"starter","origin":"https://captraex.com"}' &
          done
          wait
        requirements:
          - "curl"

    testTools:
      - "k6"
      - "Locust"
      - "API gateway metrics"

    expectedBehavior: >
      Without robust abuse controls, burst traffic causes elevated error rates and
      checkout latency for legitimate prospects.

    expectedMitigation: >
      API enforces adaptive rate limiting, abuse detection, and alerting while
      preserving throughput for legitimate traffic.

    countermeasures:
      - ID: CM_008_RATE_LIMIT
        title: "Apply Rate Limiting and Burst Controls on Checkout Endpoint"
        description: >
          Enforce per-IP and behavioral throttles with HTTP 429 responses and
          retry guidance.
        status: in_place

      - ID: CM_008_BOT_SIGNAL
        title: "Add Bot Detection Signals to CTA/Checkout Flow"
        description: >
          Introduce server-side abuse scoring and optional challenges for repeated
          suspicious checkout creation attempts.
        status: in_place

      - ID: CM_008_MONITORING
        title: "Alert on Checkout Error Rate and Abuse Spikes"
        description: >
          Configure operational alerts for sudden checkout failure spikes,
          anomalous request volume, and regional abuse concentration.
        status: in_place
