meta:
  title: Serverless File Upload & Processing Platform
  modelId: TM-SERVERLESS-UPLOAD
  version: "1.0"
  scope: Cloud Serverless Architecture
  owner: Development Team
  lastUpdated: "2026-01-24"

assets:
  - ID: A-SPA
    name: Web Frontend (SPA)
    type: Client
    description: Browser-based React application used by end users.
    trustZone: Internet
    dataFlows:
      - ID: DF-01
        name: Authentication Request
        source: A-SPA
        destination: A-IDP
        protocol: HTTPS
        dataClassification: Restricted
        crossesTrustBoundary: true
      - ID: DF-02
        name: Upload Request (Get URL)
        source: A-SPA
        destination: A-API
        protocol: HTTPS
        dataClassification: Restricted
        crossesTrustBoundary: true
      - ID: DF-03
        name: File Upload (PUT)
        source: A-SPA
        destination: A-OBJ-STORE
        protocol: HTTPS
        dataClassification: Confidential
        crossesTrustBoundary: true

  - ID: A-API
    name: Backend API
    type: Serverless Service
    description: Stateless serverless REST API for auth validation and issuing upload permissions.
    trustZone: Cloud Managed
    dataFlows:
      - ID: DF-04
        name: Return Pre-signed URL
        source: A-API
        destination: A-SPA
        protocol: HTTPS
        dataClassification: Restricted
        crossesTrustBoundary: true

  - ID: A-OBJ-STORE
    name: Object Storage Service
    type: Data Store
    description: Stores uploaded files and emits events upon object creation.
    trustZone: Cloud Data
    dataFlows:
      - ID: DF-05
        name: Object Created Event
        source: A-OBJ-STORE
        destination: A-PROC-FUNC
        protocol: Internal Event
        dataClassification: Internal
        crossesTrustBoundary: false

  - ID: A-PROC-FUNC
    name: Processing Function
    type: Compute
    description: Processes uploaded files and extracts metadata triggered by storage events.
    trustZone: Cloud Compute
    dataFlows:
      - ID: DF-06
        name: Store Metadata
        source: A-PROC-FUNC
        destination: A-DB
        protocol: TCP/Database
        dataClassification: Internal
        crossesTrustBoundary: false
      - ID: DF-07
        name: Read File Content
        source: A-PROC-FUNC
        destination: A-OBJ-STORE
        protocol: HTTPS/Internal
        dataClassification: Confidential
        crossesTrustBoundary: false

  - ID: A-DB
    name: Metadata Database
    type: Database
    description: Managed NoSQL database storing extracted metadata.
    trustZone: Cloud Data
    dataFlows: []

  - ID: A-IDP
    name: Identity Provider
    type: External Service
    description: External service (OAuth 2.0 / OIDC).
    trustZone: External
    dataFlows:
      - ID: DF-08
        name: Return Token
        source: A-IDP
        destination: A-SPA
        protocol: HTTPS
        dataClassification: Restricted
        crossesTrustBoundary: true

attackers:
  - REFID: ATT-EXT
    name: External Attacker
    description: Unauthenticated remote attacker.
    motivation: Disruption, malware distribution.
    capability: Varied

  - REFID: ATT-MAL-USER
    name: Malicious Insider/User
    description: Authenticated user attempting to abuse the system.
    motivation: Privilege gain, data theft.
    capability: Authenticated access

securityObjectives:
  - ID: SO-CONF
    name: Confidentiality
    description: Ensure uploaded files are only accessible to owners.
    category: CIA
  - ID: SO-INT
    name: Integrity
    description: Ensure metadata accurately reflects file content.
    category: CIA
  - ID: SO-AVAIL
    name: Availability
    description: Ensure platform is resilient to DOS attacks.
    category: CIA

threats:
  - ID: T-01
    title: Malicious File Upload (Malware Distribution)
    threatType: Tampering
    attack: An attacker uploads a file containing malware.
    impactDesc: Valid users execute malware, potentially compromising their systems or the organization.
    impactedSecObj:
      - SO-INT
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:H/A:H
      score: 9.0
      severity: Critical
    testPrerequisites:
      - "Staging environment deployed"
      - "Anti-malware scanner temporarily disabled (to test propagation) or enabled (to test detection)"
      - "Sample EICAR file"
    testSteps:
      - "Authenticate as a standard user."
      - "Generate a pre-signed URL for upload."
      - "Upload the EICAR test file designated as 'report.pdf'."
      - "Observe if the file is accepted and processed."
      - "Attempt to download the file as another user."
    expectedBehavior: "The system should detect the malware signature upon upload/processing and quarantine/delete the file."
    countermeasures:
      - ID: CM-01
        title: Malware Scanning
        description: Scan all files immediately after upload. Quarantine until clean.
        status: planned
        effort: Medium
        why: >
          Without scanning, a malicious file travels unhindered from the upload bucket through processing
          and into the download path where legitimate users can retrieve and execute it. Scanning at the
          ingestion boundary before the file is ever made accessible eliminates this path entirely. The
          quarantine pattern ensures a file cannot be read until it has received a clean verdict.
        implementation:
          - "Route all uploads to a quarantine storage prefix. Grant no read permission on this prefix to any application role."
          - "Attach an event-driven function to the storage creation event on the quarantine prefix and integrate a malware scanning engine."
          - "On a clean verdict, move the object to a clean prefix. On a failed verdict, delete the object and trigger an alert."
          - "Deny download URL generation for any object whose key path is not under the clean prefix."
          - "Automate antivirus signature database updates on a daily schedule."
          - "Log all scan verdicts including file hash, timestamp, and verdict with an appropriate retention period."
      - ID: CM-02
        title: Sandbox Processing
        description: Process files in ephemeral, isolated sandbox environments.
        status: planned
        effort: Medium
        why: >
          Malware scanning catches known signatures, but a novel or obfuscated payload may evade detection
          and reach the processing function. Isolating the processing runtime in a network-restricted,
          ephemeral environment limits the blast radius of a successful exploit to that single short-lived
          execution context. The attacker gains no persistent foothold and cannot use the compromised
          function as a pivot point.
        implementation:
          - "Deploy the processing function inside a private network with no internet gateway route from the processing subnet."
          - "Create a dedicated execution identity for the processing function — do not share it with any other function or service."
          - "Restrict the execution identity to read access on the quarantine prefix and write access on the metadata store only."
          - "Add an explicit deny for identity management and privilege escalation APIs on the execution identity."
          - "Set a processing timeout to abort runaway execution."
          - "Enable encryption at rest for all ephemeral function storage."

  - ID: T-02
    title: Remote Code Execution via Parsing Vulnerability
    threatType: Elevation of Privilege
    attack: Attacker uploads a malformed file exploiting a vulnerable parser.
    impactDesc: Attacker gains code execution within the serverless function environment.
    impactedSecObj:
      - SO-CONF
      - SO-INT
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H
      score: 7.5
      severity: High
    testPrerequisites:
      - "Environment with known vulnerable parser library (for negative testing) or current version"
      - "Specifically crafted payload for the image/document parser"
    testSteps:
      - "Identify the parsing library used (e.g., ImageMagick, libxml)."
      - "Create a payload targeting a known CVE in that library."
      - "Upload the payload."
      - "Monitor logs for evidence of RCE (e.g., outbound network connection, environment variable dump)."
    expectedBehavior: "The function should either crash safely or process the file without executing embedded code."
    countermeasures:
      - ID: CM-03
        title: Update Libraries
        description: Automated dependency patching for parsing libraries.
        status: in_place
        effort: Low
        why: >
          Parsing libraries are frequent targets for remote code execution. A single unpatched vulnerability
          allows a crafted file upload to execute arbitrary code inside the processing function. Automated
          patching ensures the window of exposure after a vulnerability disclosure is measured in days, not months.
        implementation:
          - "Use dependency lock files to pin all library versions in the deployment package."
          - "Enable automated dependency update tooling to open pull requests within 24 hours of a vulnerability publication."
          - "Add a dependency vulnerability scan step to the CI pipeline that fails the build on any critical or high severity finding."
          - "Use container images for the function runtime and enable container image scanning in the deployment pipeline."
          - "Schedule a weekly forced dependency refresh to catch vulnerabilities disclosed between automated update cycles."
      - ID: CM-04
        title: Least Privilege IAM
        description: Restrict function role to only necessary buckets/tables.
        status: in_place
        effort: Low
        why: >
          If a code execution vulnerability is exploited, the attacker inherits the permissions of the
          function's execution identity. A permissive identity allows exfiltration of all storage, privilege
          escalation, and lateral movement to other services. A minimal-permission identity turns a
          potentially catastrophic breach into a contained, scoped incident.
        implementation:
          - "Create a dedicated execution identity for the processing function — never share with other functions or services."
          - "Grant read access scoped to the quarantine prefix only — not the entire storage bucket."
          - "Grant write access scoped to the metadata table only — no other database actions."
          - "Add explicit deny statements for identity management APIs, storage deletion, and storage listing."
          - "Attach a permission boundary to prevent any inline policy from exceeding defined limits."
          - "Review and remove unused permissions on a quarterly basis."

  - ID: T-03
    title: Denial of Service via Large Files
    threatType: Denial of Service
    attack: Attacker uploads massive files to exhaust storage or budget.
    impactDesc: System becomes unavailable or incurs massive costs.
    impactedSecObj:
      - SO-AVAIL
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:N/A:H
      score: 6.5
      severity: Medium
    testSteps:
      - "Attempt to generate a pre-signed URL for a 10TB file size request."
      - "Attempt to upload >5GB data to a URL signed for 10MB."
    expectedBehavior: "API should reject the URL request. Storage service should reset connection if upload exceeds signed content-length."
    countermeasures:
      - ID: CM-05
        title: Enforce Limits
        description: Strict size limits in pre-signed URL generation.
        status: planned
        effort: Low
        why: >
          Without size limits at the URL generation layer, an attacker can request signatures for
          arbitrarily large uploads. This exhausts storage quotas, triggers function timeout errors,
          and generates unexpected cloud spend — all without further authentication. Enforcing limits at
          generation time means no storage or compute resources are consumed for oversized requests.
        implementation:
          - "Validate the requested content type against an allow-list and reject anything outside it."
          - "Validate the requested content length against a maximum and reject oversized requests."
          - "Apply request throttling at the API layer per authenticated user."
          - "Set a concurrency limit on the processing function to prevent unbounded scaling under denial of service load."
          - "Configure a cost alarm to alert when storage spend exceeds a monthly threshold."
      - ID: CM-06
        title: Use Content-Length-Range
        description: Enforce content-length-range condition in signed upload policy.
        status: planned
        effort: Low
        why: >
          A pre-signed upload URL grants a write operation but does not restrict upload size at the storage
          service layer. A user with a valid URL for a small file can PUT far more data by writing a larger
          request body. A content-length-range condition in a signed policy is enforced by the storage service
          itself before any data is stored, independently of the application layer.
        implementation:
          - "Switch the upload flow from pre-signed PUT URLs to POST uploads with a signed policy document."
          - "Include a content-length-range condition in the signed policy restricting minimum and maximum byte sizes."
          - "Include a content-type condition in the signed policy restricted to the allowed MIME type list."
          - "Set the policy expiry to a maximum of 15 minutes to limit the replay window."
          - "Return all signed policy fields to the frontend for direct-to-storage upload."

  - ID: T-04
    title: Unauthorized Metadata Access (IDOR)
    threatType: Information Disclosure
    attack: Attacker requests metadata for files meant for other users.
    impactDesc: Confidential file metadata is leaked.
    impactedSecObj:
      - SO-CONF
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N
      score: 6.5
      severity: Medium
    testSteps:
      - "User A uploads File 1."
      - "User B captures their own valid session token."
      - "User B attempts to call GET /metadata/{File1-ID}."
    expectedBehavior: "API should return 403 Forbidden or 404 Not Found."
    countermeasures:
      - ID: CM-07
        title: Object Level Authorization
        description: Check user ownership of file ID before returning data.
        status: in_place
        effort: Low
        why: >
          The API uses a user-supplied file ID to retrieve data without verifying the requesting user
          owns that object. Any authenticated user who guesses or enumerates a valid file ID receives the
          associated metadata. Ownership verification at every read operation breaks this attack path
          regardless of how the ID was obtained.
        implementation:
          - "At write time, store the authenticated user's identity claim as an owner attribute on every metadata record."
          - "On every read request, extract the user identity from the validated token, query the record, and assert ownership before returning any data."
          - "Return HTTP 404 rather than 403 to avoid confirming the existence of records owned by other users."
          - "For list endpoints, apply a server-side filter scoped to the requesting user's identity — never return unfiltered record sets."
          - "Write a dedicated integration test asserting that one user cannot read another user's records."

  - ID: T-01
    title: Malicious File Upload (Malware Distribution)
    threatType: Tampering
    attack: An attacker uploads a file containing malware.
    impactDesc: Valid users execute malware, potentially compromising their systems or the organization.
    impactedSecObj:
      - SO-INT
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:H/A:H
      score: 9.0
      severity: Critical
    testPrerequisites:
      - "Staging environment deployed"
      - "Anti-malware scanner temporarily disabled (to test propagation) or enabled (to test detection)"
      - "Sample EICAR file"
    testSteps:
      - "Authenticate as a standard user."
      - "Generate a pre-signed URL for upload."
      - "Upload the EICAR test file designated as 'report.pdf'."
      - "Observe if the file is accepted and processed."
      - "Attempt to download the file as another user."
    expectedBehavior: "The system should detect the malware signature upon upload/processing and quarantine/delete the file."
    countermeasures:
      - ID: CM-01
        title: Malware Scanning
        description: Scan all files immediately after upload. Quarantine until clean.
        status: planned
        effort: Medium
        why: >
          Without scanning, a malicious file travels unhindered from the upload bucket through processing
          and into the download path where legitimate users can retrieve and execute it. Scanning at the
          ingestion boundary — before the file is ever made accessible or processed — eliminates this path
          entirely. The quarantine pattern ensures a file cannot be read by any application role until it
          has received a clean verdict.
        implementation:
          - "Route all uploads to a `quarantine/` S3 prefix. Grant no s3:GetObject permission on this prefix to any application role."
          - "Attach a Lambda function to the S3 ObjectCreated event on the quarantine prefix. Integrate AWS GuardDuty Malware Protection for S3, or deploy ClamAV as a Lambda layer."
          - "On a PASS verdict, move the object to a `clean/` prefix. On FAIL, delete the object and publish an alert to SNS."
          - "Deny pre-signed download URL generation for any object whose key is not under the `clean/` prefix."
          - "Automate AV signature database updates on a daily schedule via a separate maintenance Lambda or container layer rebuild."
          - "Log all scan verdicts (file hash, timestamp, verdict) to CloudWatch Logs with a 90-day retention policy."
        references:
          - "OWASP File Upload Cheat Sheet - https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html"
          - "AWS GuardDuty Malware Protection for S3 - https://docs.aws.amazon.com/guardduty/latest/ug/gdu-malware-protection-s3.html"
          - "CIS AWS Foundations Benchmark v2.0 - Control 2.1.2"
      - ID: CM-02
        title: Sandbox Processing
        description: Process files in ephemeral, isolated sandbox environments.
        status: planned
        effort: Medium
        why: >
          Malware scanning catches known signatures, but a novel or obfuscated payload may evade detection
          and reach the processing function. Isolating the processing runtime in a network-restricted, ephemeral
          environment limits the blast radius of a successful exploit to that single short-lived Lambda context.
          The attacker gains no persistent foothold, cannot reach other buckets or services, and cannot use the
          compromised function as a pivot point.
        implementation:
          - "Deploy the Processing Lambda inside a VPC with private subnets. Attach only VPC endpoints for S3 and DynamoDB — remove all internet gateway routes from the processing subnet."
          - "Create a dedicated IAM execution role for the Processing Lambda. Do not share this role with any other function."
          - "Restrict the role to s3:GetObject on the quarantine prefix ARN and dynamodb:PutItem on the metadata table ARN only."
          - "Add an explicit IAM Deny for iam:*, sts:AssumeRole, and ec2:* on the execution role to block privilege escalation."
          - "Set Lambda ephemeral storage (/tmp) to the minimum required size and enable encryption at rest."
          - "Set a Lambda timeout of 30 seconds — abort processing on timeout to prevent runaway execution."
        references:
          - "AWS Lambda security best practices - https://docs.aws.amazon.com/lambda/latest/dg/best-practices.html"
          - "NIST SP 800-190: Application Container Security Guide"
          - "CWE-284: Improper Access Control"

  - ID: T-02
    title: Remote Code Execution via Parsing Vulnerability
    threatType: Elevation of Privilege
    attack: Attacker uploads a malformed file exploiting a vulnerable parser.
    impactDesc: Attacker gains code execution within the serverless function environment.
    impactedSecObj:
      - SO-CONF
      - SO-INT
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H
      score: 7.5
      severity: High
    testPrerequisites:
      - "Environment with known vulnerable parser library (for negative testing) or current version"
      - "Specifically crafted payload for the image/document parser"
    testSteps:
      - "Identify the parsing library used (e.g., ImageMagick, libxml)."
      - "Create a payload targeting a known CVE in that library (e.g., ImageTragick)."
      - "Upload the payload."
      - "Monitor logs for evidence of RCE (e.g., outbound network connection, environment variable dump)."
    expectedBehavior: "The function should either crash safely or process the file without executing embedded code."
    countermeasures:
      - ID: CM-03
        title: Update Libraries
        description: Automated dependency patching for parsing libraries.
        status: in_place
        effort: Low
        why: >
          Parsing libraries — ImageMagick, libxml2, Pillow, pdfminer — are frequent RCE targets. A single
          unpatched CVE (e.g., ImageTragick CVE-2016-3714, Ghostscript CVE-2018-16509) allows a crafted
          file upload to execute arbitrary code inside the processing function. Automated patching ensures
          the window of exposure after a CVE disclosure is measured in days, not months.
        implementation:
          - "Use pip-compile or Poetry with lock files to pin all library versions in the deployment package."
          - "Enable Dependabot or Renovate on the repository to open automated PRs for dependency updates within 24 hours of a CVE publication."
          - "Add a `pip-audit` step to the CI pipeline that fails the build on any CRITICAL or HIGH severity CVE."
          - "Build Lambda using container images (not ZIP archives) and enable Amazon ECR Inspector or Docker Scout for image scanning."
          - "Schedule a weekly forced dependency refresh run to catch CVEs disclosed between PR cycles."
        references:
          - "OWASP A06:2021 – Vulnerable and Outdated Components - https://owasp.org/Top10/A06_2021-Vulnerable_and_Outdated_Components/"
          - "pip-audit - https://pypi.org/project/pip-audit/"
          - "AWS Inspector container scanning - https://docs.aws.amazon.com/inspector/latest/user/enable-disable-scanning-ecr.html"
      - ID: CM-04
        title: Least Privilege IAM
        description: Restrict function role to only necessary buckets/tables.
        status: in_place
        effort: Low
        why: >
          If an RCE vulnerability is successfully exploited, the attacker inherits the permissions of the
          Lambda execution role. A permissive role can be used to exfiltrate all S3 buckets, call IAM APIs
          to escalate privilege, or pivot to other services. A minimal-permission role turns a potentially
          catastrophic breach into a contained, scoped incident limited to a single prefix and table.
        implementation:
          - "Create a dedicated IAM role for the Processing Lambda — never share with other functions or services."
          - "Grant s3:GetObject scoped to the quarantine prefix ARN: `arn:aws:s3:::BUCKET/quarantine/*` only."
          - "Grant dynamodb:PutItem scoped to the metadata table ARN only — no other DynamoDB actions."
          - "Add explicit Deny statements for iam:*, sts:AssumeRole, s3:DeleteObject, and s3:ListBucket."
          - "Attach a permission boundary to the role to prevent any inline policy from exceeding defined limits."
          - "Run IAM Access Analyzer quarterly to surface and remove unused permissions."
        references:
          - "AWS IAM Best Practices - https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html"
          - "NIST SP 800-53 AC-6: Least Privilege"
          - "CIS AWS Foundations Benchmark v2.0 - Control 1.16"

  - ID: T-03
    title: Denial of Service via Large Files
    threatType: Denial of Service
    attack: Attacker uploads massive files to exhaust storage or budget.
    impactDesc: System becomes unavailable or incurs massive costs.
    impactedSecObj:
      - SO-AVAIL
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:N/A:H
      score: 6.5
      severity: Medium
    testSteps:
      - "Attempt to generate a pre-signed URL for a 10TB file size request."
      - "Attempt to upload >5GB data to a URL signed for 10MB."
    expectedBehavior: "API should reject the URL request. Storage service should reset connection if upload exceeds signed content-length."
    countermeasures:
      - ID: CM-05
        title: Enforce Limits
        description: Strict size limits in pre-signed URL generation.
        status: planned
        effort: Low
        why: >
          Without size limits at the URL generation layer, an attacker can request signatures for arbitrarily
          large uploads. This exhausts S3 storage quotas, triggers Lambda timeout errors in the processing
          function, and generates unexpected cloud spend — all without any further authentication. Enforcing
          limits at generation time means no storage or compute resources are consumed for oversized requests.
        implementation:
          - "In the URL generation Lambda, validate the requested Content-Type against an allow-list (e.g., image/jpeg, image/png, application/pdf) and reject anything else with HTTP 400."
          - "Validate the requested Content-Length against a maximum (e.g., 50MB). Reject with HTTP 413 if exceeded."
          - "Apply an API Gateway request throttle: 10 requests per second per user, with a burst limit of 50."
          - "Set a Lambda concurrency limit on the Processing Function to prevent unbounded scaling under DoS load."
          - "Configure a CloudWatch billing alarm to alert when S3 storage cost exceeds a monthly threshold."
        references:
          - "OWASP Denial of Service Cheat Sheet - https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html"
          - "AWS API Gateway throttling - https://docs.aws.amazon.com/apigateway/latest/developerguide/api-gateway-request-throttling.html"
      - ID: CM-06
        title: Use Content-Length-Range
        description: Enforce content-length-range condition in S3 POST policy.
        status: planned
        effort: Low
        why: >
          A pre-signed PUT URL grants an S3 write operation but does not restrict upload size at the S3
          service layer. A user with a valid 10MB URL can PUT far more data by simply writing a larger
          request body. The content-length-range condition in an S3 POST policy is enforced by S3 itself
          before any data is stored, independent of the application layer — making it impossible to bypass
          through client manipulation.
        implementation:
          - "Switch the upload flow from pre-signed PUT URLs to S3 POST uploads with a signed policy document."
          - "In the API Lambda, generate a signed POST policy including: `['content-length-range', 1, 52428800]` (1 byte to 50MB)."
          - "Include a `Content-Type` condition in the POST policy restricted to allowed MIME types."
          - "Set the policy expiry to a maximum of 15 minutes to limit replay window."
          - "Return all signed POST fields (url, policy, x-amz-signature, x-amz-credential, x-amz-date, key) to the frontend for direct-to-S3 upload."
        references:
          - "AWS S3 POST Policy Conditions - https://docs.aws.amazon.com/AmazonS3/latest/API/sigv4-HTTPPOSTConstructPolicy.html"
          - "AWS S3 presigned URL vs POST policy comparison - https://docs.aws.amazon.com/AmazonS3/latest/userguide/PresignedUrlUploadObject.html"

  - ID: T-04
    title: Unauthorized Metadata Access (IDOR)
    threatType: Information Disclosure
    attack: Attacker requests metadata for files meant for other users.
    impactDesc: Confidential file metadata is leaked.
    impactedSecObj:
      - SO-CONF
    attackers:
      - ATT-MAL-USER
    CVSS:
      vector: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N
      score: 6.5
      severity: Medium
    testSteps:
      - "User A uploads File 1."
      - "User B captures their own valid session token."
      - "User B attempts to call GET /metadata/{File1-ID}."
    expectedBehavior: "API should return 403 Forbidden or 404 Not Found."
    countermeasures:
      - ID: CM-07
        title: Object Level Authorization
        description: Check user ownership of file ID before returning data.
        status: in_place
        effort: Low
        why: >
          IDOR occurs because the API uses a user-supplied file ID to retrieve data without verifying the
          requesting user owns that object. Metadata records are indexed by file ID — not by user — so any
          authenticated user who guesses or enumerates a file ID receives the associated metadata. Ownership
          verification at every read operation breaks this attack path, regardless of how the ID was obtained.
        implementation:
          - "At write time, store the authenticated user's subject claim (JWT `sub`) as an `ownerId` attribute on every metadata record."
          - "On every GET /metadata/{fileId} request: extract the userId from the validated JWT, query the record, and assert `record.ownerId == requestingUserId` before returning any data."
          - "Return HTTP 404 (not 403) to prevent confirming the existence of records owned by other users."
          - "For list endpoints, apply a server-side DynamoDB FilterExpression: `ownerId = :userId` — never return unfiltered record sets to the application layer."
