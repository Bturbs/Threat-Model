name: Generate and Deploy Threat Model Reports

on:
  push:
    branches:
      - main
    paths:
      - 'threat-models/**'
      - 'src/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Generate all threat model reports
        run: |
          python -m src.cli batch threat-models/ --output-dir ./reports-output
      
      - name: Generate composed homepage report
        run: |
          python -m src.cli report threat-models/composed --output ./reports-output/index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports-output
          force_orphan: true
