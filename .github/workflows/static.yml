name: Generate and Deploy Threat Model Reports

on:
  push:
    branches:
      - main
    paths:
      - 'threat-models/**'
      - 'src/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Exclude composed model from deploy
        run: rm -rf threat-models/composed

      - name: Clean GitHub Pages output folder
        run: rm -rf threat-models/github-page
      
      - name: Generate all threat model reports
        run: |
          python -m src.cli batch threat-models/ --output-dir ./threat-models/github-page
      
      - name: Create homepage redirect to default report
        run: |
          if [ -f ./threat-models/github-page/meetsendai-V1/reports/threat-model.html ]; then
            target="./meetsendai-V1/reports/threat-model.html"
          elif [ -f ./threat-models/github-page/meetsendai/reports/threat-model.html ]; then
            target="./meetsendai/reports/threat-model.html"
          else
            target="./meetsendai-v0/reports/threat-model.html"
          fi

          cat > ./threat-models/github-page/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=$target" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Threat Models</title>
          </head>
          <body>
            <p>Redirecting to threat model report… <a href="$target">Continue</a></p>
          </body>
          </html>
          EOF
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./threat-models/github-page
          force_orphan: true
