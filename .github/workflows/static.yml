name: Generate and Deploy Threat Model Reports

on:
  push:
    branches:
      - main
    paths:
      - 'threat-models/**'
      - 'src/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Exclude composed model from deploy
        run: rm -rf threat-models/composed

      - name: Exclude Meetsendai V0 from deploy
        run: rm -rf threat-models/meetsendai-v0

      - name: Clean GitHub Pages output folder
        run: rm -rf threat-models/github-page
      
      - name: Generate all threat model reports
        run: |
          python -m src.cli batch threat-models/ --output-dir ./threat-models/github-page
      
      - name: Create single combined navigation page
        run: |
          set -e
          out="./threat-models/github-page/index.html"
          mapfile -t report_files < <(find ./threat-models/github-page -type f -path '*/reports/threat-model.html' | sort)

          if [ ${#report_files[@]} -eq 0 ]; then
            echo "No report files found under threat-models/github-page" >&2
            exit 1
          fi

          default_rel="${report_files[0]#./threat-models/github-page/}"

          cat > "$out" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Threat Models Portal</title>
            <style>
              :root { color-scheme: light dark; }
              * { box-sizing: border-box; }
              body { margin: 0; font-family: Segoe UI, Roboto, Arial, sans-serif; display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
              aside { border-right: 1px solid #d0d7de; padding: 16px; overflow: auto; background: #0f172a; color: #e5e7eb; }
              .count { font-size: 12px; opacity: 0.85; margin-bottom: 12px; }
              .item { display: block; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; color: #e5e7eb; text-decoration: none; background: rgba(148,163,184,.18); border: 1px solid rgba(148,163,184,.22); }
              .item:hover { background: rgba(59,130,246,.35); }
              .item.active { background: rgba(59,130,246,.55); border-color: rgba(59,130,246,.75); }
              main { height: 100vh; }
              iframe { width: 100%; height: 100%; border: 0; background: white; }
            </style>
          </head>
          <body>
            <aside>
              <h2 style="margin:0 0 4px 0;">Threat Models</h2>
              <div class="count">${#report_files[@]} report(s)</div>
              <nav id="nav"></nav>
            </aside>
            <main>
              <iframe id="viewer" src="$default_rel" title="Threat Model Report"></iframe>
            </main>
            <script>
              const reports = [
          EOF

          first=1
          for f in "${report_files[@]}"; do
            rel="${f#./threat-models/github-page/}"
            model="${rel%/reports/threat-model.html}"
            label="$model"
            if [ -f "./threat-models/$model/threat-model.yaml" ]; then
              title_line=$(grep -m 1 '^  title:\|^title:' "./threat-models/$model/threat-model.yaml" || true)
              if [ -n "$title_line" ]; then
                label=$(echo "$title_line" | sed -E 's/^[[:space:]]*title:[[:space:]]*//; s/^"//; s/"[[:space:]]*$//')
              fi
            fi

            if [ $first -eq 0 ]; then
              echo "," >> "$out"
            fi
            first=0
            printf '                {"name": "%s", "path": "%s"}' "$(printf '%s' "$label" | sed 's/"/\\"/g')" "$rel" >> "$out"
          done

          cat >> "$out" <<'EOF'
              ];

              const nav = document.getElementById('nav');
              const viewer = document.getElementById('viewer');

              function setActive(path) {
                document.querySelectorAll('.item').forEach((el) => {
                  el.classList.toggle('active', el.dataset.path === path);
                });
              }

              reports.forEach((r, idx) => {
                const a = document.createElement('a');
                a.href = '#';
                a.className = 'item' + (idx === 0 ? ' active' : '');
                a.dataset.path = r.path;
                a.textContent = r.name;
                a.addEventListener('click', (e) => {
                  e.preventDefault();
                  viewer.src = r.path;
                  setActive(r.path);
                });
                nav.appendChild(a);
              });
            </script>
          </body>
          </html>
          EOF
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./threat-models/github-page
          force_orphan: true
